name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    # Postgres service matching docker-compose.yml (postgres:16, app/app/app).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      # Non-secret, CI-only values for the ephemeral Postgres service — NOT
      # production secrets and NOT a real .env.
      PGHOST: localhost
      PGPORT: "5432"
      PGPASSWORD: app                  # lets admin `psql -U app` auth over TCP
      PSQL: psql                       # override the Makefile's docker-exec default
      ADMIN_DATABASE_URL: postgresql+asyncpg://app:app@localhost:5432/app
      TEST_ADMIN_DATABASE_URL: postgresql+asyncpg://app:app@localhost:5432/app_test
      RLS_DB_PASSWORD: uaid_app        # CI-only runtime role password (ephemeral)

    steps:
      - uses: actions/checkout@v4

      - name: Install uv (+ Python 3.11)
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Sync dependencies (locked)
        run: uv sync --locked

      - name: Lint
        run: uv run ruff check .

      - name: Docker-free tests
        run: make test

      - name: Ensure psql client is available
        run: psql --version || (sudo apt-get update && sudo apt-get install -y postgresql-client)

      - name: DB-backed tests (RLS, against Postgres service)
        run: make test-db RLS_DB_PASSWORD=uaid_app
